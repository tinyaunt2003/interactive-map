<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>互动地图</title>

<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #102a44, #020611);
  font-family: Arial, "Microsoft YaHei", sans-serif;
  color: white;
}

h1 {
  text-align: center;
  margin: 24px 0 5px;
  color: #7df9ff;
  text-shadow: 0 0 15px #00eaff;
  letter-spacing: 3px;
}

.map {
  position: relative;
  width: 1000px;
  height: 720px;
  margin: 20px auto;
  border: 1px solid rgba(0,255,255,.4);
  box-shadow: 0 0 35px rgba(0,255,255,.35);
  background-image: url("assets/china-map.png");
  background-size: 150%;
  background-repeat: no-repeat;
  background-position: center 31%;
  overflow: hidden;
}


.city {
  position: absolute;
  z-index: 5;
  padding: 5px 10px;
  border: 1px solid #00eaff;
  border-radius: 16px;
  background: rgba(0, 25, 45, 0.8);
  color: #bfffff;
  cursor: pointer;
  font-size: 14px;
  transition: 0.25s;
  box-shadow: 0 0 10px rgba(0,255,255,.5);
}

.city:hover {
  background: #00eaff;
  color: #00111f;
  transform: scale(1.25);
  z-index: 20;
  box-shadow: 0 0 25px #00eaff;
}

.super {
  border-color: #ffdd55;
  color: #ffec99;
  box-shadow: 0 0 15px rgba(255,221,85,.8);
}

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.78);
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.card {
  width: 720px;
  background: #071522;
  border: 1px solid #00eaff;
  border-radius: 18px;
  padding: 20px;
  box-shadow: 0 0 35px #00eaff;
  text-align: center;
}

.card img {
  max-width: 100%;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,.3);
}

.close {
  margin-top: 15px;
  padding: 10px 26px;
  border: none;
  border-radius: 20px;
  background: #00eaff;
  cursor: pointer;
  font-weight: bold;
}

.music-btn {
  position: absolute;
  top: 15px;
  left: 15px;
  z-index: 30;

  padding: 8px 14px;
  border: 1px solid #00eaff;
  border-radius: 18px;

  background: rgba(0, 25, 45, 0.85);
  color: #bfffff;

  cursor: pointer;
  box-shadow: 0 0 12px rgba(0,255,255,.6);
}

.title-icon {
  height: 1em;
  vertical-align: middle;
  margin-left: 8px;
}
</style>
</head>

<body>

<h1>小姨在中国，边旅行边工作
  <img class="title-icon" src="assets/logo.png" alt="">
</h1>

<audio id="bgm" src="assets/bgm.mp3" loop></audio>


<div class="map" id="map"></div>
  <button class="music-btn" onclick="toggleMusic()">🎵 播放音乐</button>
</div>

<div class="modal" id="modal">
  <div class="card">
    <h2 id="cityTitle"></h2>
    <img id="cityImage" src="" alt="">
    <p id="cityDesc"></p>
    <button class="close" onclick="closeModal()">关闭</button>
  </div>
</div>

<script>
const cities = [
  { name: "北京", type: "super", x: 690, y: 255, img: "assets/北京.png", desc: "小姨在故宫前开心合影。" },
  { name: "上海", type: "super", x: 820, y: 430, img: "assets/上海.png", desc: "小姨在外滩前开心合影。" },
  { name: "广州", type: "super", x: 665, y: 590, img: "assets/广州.png", desc: "小姨在广州塔前开心合影。" },
  { name: "深圳", type: "super", x: 685, y: 620, img: "assets/深圳.png", desc: "小姨在深圳湾开心合影。" },

  { name: "成都", x: 500, y: 455, img: "assets/成都.png", desc: "小姨在宽窄巷子开心合影。" },
  { name: "杭州", x: 800, y: 465, img: "assets/杭州.png", desc: "小姨在西湖开心合影。" },
  { name: "重庆", x: 575, y: 455, img: "assets/重庆.png", desc: "小姨在洪崖洞开心合影。" },
  { name: "武汉", x: 650, y: 455, img: "assets/武汉.png", desc: "小姨在黄鹤楼开心合影。" },
  { name: "西安", x: 600, y: 400, img: "assets/西安.png", desc: "小姨在大雁塔开心合影。" },
  { name: "南京", x: 755, y: 420, img: "assets/南京.png", desc: "小姨在秦淮河开心合影。" },
  { name: "苏州", x: 800, y: 440, img: "assets/苏州.png", desc: "小姨在苏州园林开心合影。" },
  { name: "天津", x: 715, y: 285, img: "assets/天津.png", desc: "小姨在海河边开心合影。" },
  { name: "郑州", x: 665, y: 380, img: "assets/郑州.png", desc: "小姨在二七塔开心合影。" },
  { name: "长沙", x: 650, y: 520, img: "assets/长沙.png", desc: "小姨在橘子洲开心合影。" },
  { name: "东莞", x: 675, y: 600, img: "assets/东莞.png", desc: "小姨在城市广场开心合影。" },
  { name: "青岛", x: 780, y: 340, img: "assets/青岛.png", desc: "小姨在栈桥开心合影。" },
  { name: "宁波", x: 785, y: 480, img: "assets/宁波.png", desc: "小姨在天一阁开心合影。" },
  { name: "佛山", x: 650, y: 610, img: "assets/佛山.png", desc: "小姨在祖庙开心合影。" },
  { name: "合肥", x: 745, y: 455, img: "assets/合肥.png", desc: "小姨在逍遥津开心合影。" }
];

const map = document.getElementById("map");

cities.forEach(city => {
  const div = document.createElement("div");
  div.className = "city " + (city.type || "");
  div.style.left = city.x + "px";
  div.style.top = city.y + "px";
  div.innerText = city.name;
  div.onclick = () => openModal(city);
  map.appendChild(div);
});

function openModal(city) {
  document.getElementById("cityTitle").innerText = city.name;
  document.getElementById("cityImage").src = city.img;
  document.getElementById("cityDesc").innerText = city.desc;
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function toggleMusic() {
  const bgm = document.getElementById("bgm");
  const btn = document.querySelector(".music-btn");

  if (bgm.paused) {
    bgm.play();
    btn.innerText = "⏸ 暂停音乐";
  } else {
    bgm.pause();
    btn.innerText = "🎵 播放音乐";
  }
}

</script>

</body>
</html>
